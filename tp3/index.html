<html lang="es">

<head>

  <style>
    /* ============================================
       RESET Y VARIABLES
       ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #7a8fa8;
      /* azul grisáceo — tono clínico/neutro */
      --primary-light: #a8bccf;
      --accent: #b57f8a;
      /* rosa desaturado (coherente con tp2) */
      --text-dark: #2b2b2b;
      --text-medium: #4f4f4f;
      --text-light: #707070;
      --bg-page: #fafaf8;
      --bg-card: #f7f5f3;
      --bg-highlight: #eef2f6;
      --border: #e0e6ed;
      --border-light: #eceff3;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --max-width: 860px;
      --radius: 6px;
    }

    body {
      font-family: var(--font);
      font-size: 1rem;
      line-height: 1.75;
      color: var(--text-dark);
      background: var(--bg-page);
      -webkit-font-smoothing: antialiased;
    }

    p {
      text-indent: 1.27cm;
      color: var(--text-dark);
    }

    /* ============================================
       NAVBAR
       ============================================ */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 250, 248, 0.95);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .navbar-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 4px;
      height: 48px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .navbar-inner::-webkit-scrollbar {
      display: none;
    }

    .nav-btn {
      white-space: nowrap;
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-light);
      padding: 6px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .nav-btn:hover,
    .nav-btn.active {
      background: var(--bg-highlight);
      color: var(--primary);
    }

    .nav-sep {
      color: var(--border);
      font-size: 0.75rem;
      padding: 0 2px;
    }

    /* ============================================
       LAYOUT PRINCIPAL
       ============================================ */
    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    /* ============================================
       HEADER
       ============================================ */
    .header {
      text-align: center;
      margin-bottom: 56px;
      padding-bottom: 48px;
      border-bottom: 1px solid var(--border);
    }

    .header-label {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--primary);
      background: var(--bg-highlight);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 4px 14px;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .header .subtitle {
      font-size: 0.95rem;
      color: var(--text-light);
      max-width: 580px;
      margin: 0 auto;
      text-indent: 0;
    }

    .header .dx-badge {
      display: inline-block;
      margin-top: 18px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--accent);
      background: rgba(181, 127, 138, 0.08);
      border: 1px solid rgba(181, 127, 138, 0.25);
      border-radius: 99px;
      padding: 4px 14px;
    }

    /* ============================================
       SECTION WRAPPER
       ============================================ */
    .section {
      margin-bottom: 72px;
      scroll-margin-top: 64px;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: -0.01em;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ============================================
       INFO PERSONAL — FICHA
       ============================================ */
    .ficha-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .ficha-item {
      background: var(--bg-page);
      padding: 14px 18px;
    }

    .ficha-item.full {
      grid-column: 1 / -1;
    }

    .ficha-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .ficha-value {
      font-size: 0.92rem;
      color: var(--text-dark);
      line-height: 1.5;
      text-indent: 0;
      white-space: pre-wrap;
    }

    .ficha-value.placeholder {
      color: var(--text-light);
      font-style: italic;
    }

    /* ============================================
       CAROUSEL DE ESCENAS
       ============================================ */
    .carousel-wrapper {
      position: relative;
    }

    .carousel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .carousel-counter {
      font-size: 0.8rem;
      color: var(--text-light);
      font-weight: 500;
    }

    .carousel-nav {
      display: flex;
      gap: 6px;
    }

    .carousel-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      background: var(--bg-page);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 1rem;
      color: var(--text-medium);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .carousel-btn:hover:not(:disabled) {
      background: var(--bg-highlight);
      border-color: var(--primary);
      color: var(--primary);
    }

    .carousel-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .scene-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-page);
    }

    .scene-card-header {
      background: var(--bg-highlight);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .scene-number {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .scene-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-top: 4px;
    }

    .scene-timestamp {
      font-size: 0.78rem;
      color: var(--text-light);
      white-space: nowrap;
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: var(--bg-page);
      flex-shrink: 0;
    }

    .scene-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .scene-field-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 6px;
    }

    .scene-desc {
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--text-medium);
      font-style: italic;
      text-indent: 0;
      white-space: pre-line;
    }

    .scene-dialogue {
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--text-dark);
      border-left: 3px solid var(--border);
      padding-left: 14px;
      font-style: italic;
      text-indent: 0;
    }

    .scene-capture {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      background: var(--bg-card);
      color: var(--text-light);
      font-size: 0.82rem;
    }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 99px;
      background: var(--border);
      cursor: pointer;
      transition: background 0.2s, width 0.2s;
    }

    .dot.active {
      background: var(--primary);
      width: 18px;
    }

    /* ============================================
       ACCORDION
       ============================================ */
    .accordion {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .accordion-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .accordion-trigger {
      width: 100%;
      background: var(--bg-page);
      border: none;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text-dark);
      text-align: left;
      transition: background 0.15s;
    }

    .accordion-trigger:hover {
      background: var(--bg-card);
    }

    .accordion-trigger.open {
      background: var(--bg-highlight);
      color: var(--primary);
    }

    .accordion-icon {
      font-size: 0.75rem;
      color: var(--text-light);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .accordion-icon.open {
      transform: rotate(180deg);
    }

    .accordion-content {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.25s ease;
    }

    .accordion-content.open {
      grid-template-rows: 1fr;
    }

    .accordion-content-inner {
      overflow: hidden;
      padding: 0 18px;
      transition: padding 0.25s ease;
    }

    .accordion-content.open .accordion-content-inner {
      padding: 16px 18px 18px;
    }

    .accordion-content p {
      font-size: 0.92rem;
      line-height: 1.75;
      color: var(--text-medium);
      text-indent: 0;
      margin-bottom: 10px;
    }

    .accordion-content p:last-child {
      margin-bottom: 0;
    }

    .accordion-content .placeholder-text {
      color: var(--text-light);
      font-style: italic;
      font-size: 0.88rem;
      white-space: pre-wrap;
      text-indent: 0;
    }

    /* Sub-label dentro de accordion */
    .sub-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--primary-light);
      margin-top: 12px;
      margin-bottom: 4px;
    }

    .sub-label:first-child {
      margin-top: 0;
    }

    /* ============================================
       CRITERIOS DSM — TARJETAS A/B/C
       ============================================ */
    .dsm-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .dsm-criterion-label {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dsm-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: var(--primary);
      color: white;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* ============================================
       TABLA DE DIAGNÓSTICO DIFERENCIAL
       ============================================ */
    .dx-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .dx-table th {
      background: var(--bg-highlight);
      color: var(--primary);
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 10px 14px;
      border: 1px solid var(--border);
      text-align: left;
    }

    .dx-table td {
      padding: 10px 14px;
      border: 1px solid var(--border);
      color: var(--text-medium);
      vertical-align: top;
      line-height: 1.6;
    }

    .dx-table tr:first-child td {
      background: rgba(122, 143, 168, 0.05);
    }

    .dx-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-dark);
      display: block;
      margin-bottom: 2px;
    }

    /* ============================================
       IMPRESIÓN FINAL
       ============================================ */
    .impresion-box {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .impresion-box-header {
      background: var(--bg-highlight);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .impresion-box-body {
      padding: 20px;
    }

    .impresion-box-body p {
      font-size: 0.92rem;
      line-height: 1.75;
      color: var(--text-medium);
      text-indent: 0;
      margin-bottom: 12px;
    }

    .impresion-box-body p:last-child {
      margin-bottom: 0;
    }

    .impresion-box-body .placeholder-text {
      color: var(--text-light);
      font-style: italic;
    }

    /* ============================================
       FOOTER
       ============================================ */
    .footer {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid var(--border-light);
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-light);
      line-height: 1.6;
    }

    .footer p {
      text-indent: 0;
    }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 600px) {
      .ficha-grid {
        grid-template-columns: 1fr;
      }

      .ficha-item.full {
        grid-column: 1;
      }

      .header h1 {
        font-size: 1.6rem;
      }

      .scene-card-header {
        flex-direction: column;
      }

      .dx-table {
        font-size: 0.82rem;
      }
    }

    /* Focus visible */
    button:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    ::selection {
      background: rgba(122, 143, 168, 0.15);
    }
  </style>
</head>

    /* --- Accordion genérico --- */
    function Accordion({ items }) {
      const [open, setOpen] = useState(null);
      const toggle = (id) => setOpen(open === id ? null : id);

      return (
        <div className="accordion">
          {items.map((item) => (
            <div className="accordion-item" key={item.id}>
              <button
                className={`accordion-trigger ${open === item.id ? "open" : ""}`}
                onClick={() => toggle(item.id)}
                aria-expanded={open === item.id}
              >
                <span>{item.trigger}</span>
                <span className={`accordion-icon ${open === item.id ? "open" : ""}`}>▼</span>
              </button>
              <div className={`accordion-content ${open === item.id ? "open" : ""}`}>
                <div className="accordion-content-inner">
                  {item.content}
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    /* --- Carrusel de escenas --- */
    function SceneCarousel({ scenes }) {
      const [current, setCurrent] = useState(0);
      const total = scenes.length;
      const scene = scenes[current];

      return (
        <div className="carousel-wrapper">
          <div className="carousel-header">
            <span className="carousel-counter">Escena {current + 1} de {total}</span>
            <div className="carousel-nav">
              <button
                className="carousel-btn"
                onClick={() => setCurrent(c => c - 1)}
                disabled={current === 0}
                aria-label="Escena anterior"
              >‹</button>
              <button
                className="carousel-btn"
                onClick={() => setCurrent(c => c + 1)}
                disabled={current === total - 1}
                aria-label="Escena siguiente"
              >›</button>
            </div>
          </div>

          <div className="scene-card">
            <div className="scene-card-header">
              <div>
                <div className="scene-number">Escena {scene.id}</div>
                <div className="scene-title">{scene.title}</div>
              </div>
              <div className="scene-timestamp">{scene.timestamp}</div>
            </div>
            <div className="scene-body">

              <div>
                {scene.video ? (
                  <video
                    key={scene.id}
                    controls
                    style={{ width: "100%", borderRadius: "var(--radius)", display: "block" }}
                  >
                    <source src={scene.video} />
                  </video>
                ) : (
                  <div className="scene-capture">
                    [ Insertar captura de pantalla o referencia visual aquí ]
                    <br />
                    <span style={{ fontSize: "0.78rem", opacity: 0.7 }}>
                      Timestamp: {scene.timestamp}
                    </span>
                  </div>
                )}
              </div>

              {scene.description && (
                <div>
                  <div className="scene-field-label">Observación conductual</div>
                  <p style={{ fontSize: "0.88rem", lineHeight: 1.65, color: "var(--text-medium)", margin: 0 }}>
                    {scene.description}
                  </p>
                </div>
              )}

              {scene.indagacion && (
                <div>
                  <div className="scene-field-label">Indagación</div>
                  <p style={{ fontSize: "0.88rem", lineHeight: 1.65, color: "var(--text-medium)", margin: 0, whiteSpace: "pre-wrap", fontStyle: "italic", textIndent: 0 }}>
                    {scene.indagacion}

                </div>
              )}

            </div>
          </div>

          <div className="carousel-dots">
            {scenes.map((_, i) => (
              <div
                key={i}

                <div className="impresion-box-body">
                  <p>Aunque se identifican algunos síntomas compatibles con depresión, la presencia de un fenómeno perceptivo autónomo, no congruente con el estado de ánimo, orienta hacia Trastorno Psicótico Breve (TPB) con inicio en el postparto. A diferencia del Trastorno Depresivo Mayor con características psicóticas, donde las alucinaciones suelen reflejar culpabilidad intensa o sentimientos depresivos, la alucinación observada tiene función protectora, compensatoria, organizadora y de sostén ("Estoy acá para cuidarte"), sin contenido destructivo. Además, Marlo no cumple con los criterios completos de un episodio depresivo sostenido y su nivel de funcionamiento se mantiene relativamente preservado durante el episodio. La duración aguda y la naturaleza primariamente psicótica de los síntomas respaldan la conceptualización como TPB. Por estas razones, se prioriza TPB como diagnóstico más consistente con la evidencia observacional e indagatoria.</p>
